# ── Weekly summary (Monday 9:05am) ───────────────────────────────────────────
- id: "fin_commitment_weekly_summary"
  alias: "Financial Commitments — Weekly Summary"
  description: "Every Monday at 9:05am, send a full summary of all active commitments"
  trigger:
    - platform: time
      at: "09:05:00"
  condition:
    - condition: time
      weekday:
        - mon
  action:
    - service: notify.telegram
      data:
        title: "Weekly Financial Commitments Summary"
        message: >
          {% set sensors = [
            'sensor.mortgage_days_remaining',
            'sensor.car_insurance_days_remaining',
            'sensor.home_insurance_days_remaining',
            'sensor.broadband_days_remaining',
            'sensor.energy_days_remaining',
            'sensor.phone_contract_days_remaining'
          ] %}
          {% set ns = namespace(lines=[], urgent=0) %}
          {% for s in sensors %}
            {% set d = states(s) %}
            {% set archived = state_attr(s, 'archived') %}
            {% if archived != 'on' and d not in ['unknown', 'unavailable'] %}
              {% set days = d | int %}
              {% set name = state_attr(s, 'commitment') %}
              {% set provider = state_attr(s, 'provider') %}
              {% set amount = state_attr(s, 'amount') %}
              {% if days < 0 %}
                {% set ns.lines = ns.lines + ['EXPIRED *' ~ name ~ '* — ' ~ (days | abs) ~ ' days ago — ' ~ provider ~ ' ' ~ amount] %}
                {% set ns.urgent = ns.urgent + 1 %}
              {% elif days <= 7 %}
                {% set ns.lines = ns.lines + ['URGENT *' ~ name ~ '* — ' ~ days ~ ' days — ' ~ provider ~ ' ' ~ amount] %}
                {% set ns.urgent = ns.urgent + 1 %}
              {% elif days <= 30 %}
                {% set ns.lines = ns.lines + ['SOON *' ~ name ~ '* — ' ~ days ~ ' days — ' ~ provider ~ ' ' ~ amount] %}
              {% elif days <= 90 %}
                {% set ns.lines = ns.lines + ['UPCOMING *' ~ name ~ '* — ' ~ days ~ ' days — ' ~ provider ~ ' ' ~ amount] %}
              {% else %}
                {% set ns.lines = ns.lines + ['OK *' ~ name ~ '* — ' ~ days ~ ' days — ' ~ provider ~ ' ' ~ amount] %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {% if ns.lines | length == 0 %}
          No active commitments tracked.
          {% else %}
          {{ ns.lines | join('\n') }}

          {% if ns.urgent == 0 %}
          All clear — nothing needs immediate attention.
          {% else %}
          {{ ns.urgent }} commitment(s) need attention!
          {% endif %}
          {% endif %}
  mode: single

# ── Urgent alert (real-time, when any commitment drops to ≤7 days) ───────────
- id: "fin_commitment_urgent_alert"
  alias: "Financial Commitments — Urgent Alert"
  description: "Immediate alert when a commitment drops to 7 days or fewer"
  trigger:
    - platform: numeric_state
      entity_id:
        - sensor.mortgage_days_remaining
        - sensor.car_insurance_days_remaining
        - sensor.home_insurance_days_remaining
        - sensor.broadband_days_remaining
        - sensor.energy_days_remaining
        - sensor.phone_contract_days_remaining
      below: 8
  condition:
    - condition: template
      value_template: >
        {{ state_attr(trigger.entity_id, 'archived') != 'on' }}
  action:
    - service: notify.telegram
      data:
        title: "Urgent: {{ state_attr(trigger.entity_id, 'commitment') }}"
        message: >
          *{{ state_attr(trigger.entity_id, 'commitment') }}* expires in *{{ states(trigger.entity_id) }} days*!
          Provider: {{ state_attr(trigger.entity_id, 'provider') }}
          Amount: {{ state_attr(trigger.entity_id, 'amount') }}
          Expiry: {{ state_attr(trigger.entity_id, 'expiry') }}

          Action needed — renew or update the expiry date in HA.
  mode: queued
  max: 10
