# Automations for ha-financial-commitments
# Reference from configuration.yaml: automation: !include automations.yaml
#
# Prerequisites:
#   - Telegram Bot integration configured in HA
#   - A notify service named "telegram" (or update the service calls below)

# ── Daily reminder check ─────────────────────────────────────────────────────
# Runs once a day at 9am. For each active commitment, sends a Telegram message
# if it's at exactly 90, 30, or 7 days out — or if it's expired.

- id: "fin_commitment_daily_check"
  alias: "Financial Commitments — Daily Reminder Check"
  description: "Check all commitments and send Telegram alerts at 90/30/7 day thresholds"
  trigger:
    - platform: time
      at: "09:00:00"
  action:
    # ── Mortgage ──
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.commitment_mortgage_archived
              state: "off"
            - condition: template
              value_template: >
                {% set d = states('sensor.mortgage_days_remaining') %}
                {{ d not in ['unknown', 'unavailable'] and d | int in [90, 30, 7] }}
          sequence:
            - service: notify.telegram
              data:
                title: "Mortgage — {{ states('sensor.mortgage_days_remaining') }} days"
                message: >
                  *Mortgage* renewal in *{{ states('sensor.mortgage_days_remaining') }} days*
                  Provider: {{ state_attr('sensor.mortgage_days_remaining', 'provider') }}
                  Amount: {{ state_attr('sensor.mortgage_days_remaining', 'amount') }}
                  Expiry: {{ state_attr('sensor.mortgage_days_remaining', 'expiry') }}
        - conditions:
            - condition: state
              entity_id: input_boolean.commitment_mortgage_archived
              state: "off"
            - condition: template
              value_template: >
                {% set d = states('sensor.mortgage_days_remaining') %}
                {{ d not in ['unknown', 'unavailable'] and d | int < 0 }}
          sequence:
            - service: notify.telegram
              data:
                title: "Mortgage — EXPIRED"
                message: >
                  *Mortgage* has *EXPIRED* ({{ states('sensor.mortgage_days_remaining') | int | abs }} days ago)
                  Provider: {{ state_attr('sensor.mortgage_days_remaining', 'provider') }}
                  Amount: {{ state_attr('sensor.mortgage_days_remaining', 'amount') }}

