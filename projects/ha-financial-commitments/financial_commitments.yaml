# ── Template sensors ──────────────────────────────────────────────────────────
# One sensor per commitment that computes days remaining and a status attribute.
# Only active (non-archived) commitments with a set date produce useful values.

template:
  - sensor:
      - name: "Mortgage — Days Remaining"
        unique_id: commitment_mortgage_days
        icon: mdi:home-city
        unit_of_measurement: "days"
        state: >
          {% set expiry = states('input_datetime.commitment_mortgage_expiry') %}
          {% if expiry in ['unknown', 'unavailable', ''] %}
            unknown
          {% else %}
            {{ (strptime(expiry, '%Y-%m-%d').date() - now().date()).days }}
          {% endif %}
        attributes:
          status: &status_template >
            {% set d = states(this.entity_id) %}
            {% if d in ['unknown', 'unavailable'] %}unknown
            {% elif d | int < 0 %}expired
            {% elif d | int <= 7 %}urgent
            {% elif d | int <= 30 %}soon
            {% elif d | int <= 90 %}upcoming
            {% else %}ok{% endif %}
          commitment: "Mortgage"
          provider: "{{ states('input_text.commitment_mortgage_provider') }}"
          amount: "{{ states('input_text.commitment_mortgage_amount') }}"
          expiry: "{{ states('input_datetime.commitment_mortgage_expiry') }}"
          archived: "{{ states('input_boolean.commitment_mortgage_archived') }}"

      - name: "Car Insurance — Days Remaining"
        unique_id: commitment_car_insurance_days
        icon: mdi:car
        unit_of_measurement: "days"
        state: >
          {% set expiry = states('input_datetime.commitment_car_insurance_expiry') %}
          {% if expiry in ['unknown', 'unavailable', ''] %}
            unknown
          {% else %}
            {{ (strptime(expiry, '%Y-%m-%d').date() - now().date()).days }}
          {% endif %}
        attributes:
          status: *status_template
          commitment: "Car Insurance"
          provider: "{{ states('input_text.commitment_car_insurance_provider') }}"
          amount: "{{ states('input_text.commitment_car_insurance_amount') }}"
          expiry: "{{ states('input_datetime.commitment_car_insurance_expiry') }}"
          archived: "{{ states('input_boolean.commitment_car_insurance_archived') }}"

      - name: "Home Insurance — Days Remaining"
        unique_id: commitment_home_insurance_days
        icon: mdi:shield-home
        unit_of_measurement: "days"
        state: >
          {% set expiry = states('input_datetime.commitment_home_insurance_expiry') %}
          {% if expiry in ['unknown', 'unavailable', ''] %}
            unknown
          {% else %}
            {{ (strptime(expiry, '%Y-%m-%d').date() - now().date()).days }}
          {% endif %}
        attributes:
          status: *status_template
          commitment: "Home Insurance"
          provider: "{{ states('input_text.commitment_home_insurance_provider') }}"
          amount: "{{ states('input_text.commitment_home_insurance_amount') }}"
          expiry: "{{ states('input_datetime.commitment_home_insurance_expiry') }}"
          archived: "{{ states('input_boolean.commitment_home_insurance_archived') }}"

      - name: "Broadband — Days Remaining"
        unique_id: commitment_broadband_days
        icon: mdi:wifi
        unit_of_measurement: "days"
        state: >
          {% set expiry = states('input_datetime.commitment_broadband_expiry') %}
          {% if expiry in ['unknown', 'unavailable', ''] %}
            unknown
          {% else %}
            {{ (strptime(expiry, '%Y-%m-%d').date() - now().date()).days }}
          {% endif %}
        attributes:
          status: *status_template
          commitment: "Broadband"
          provider: "{{ states('input_text.commitment_broadband_provider') }}"
          amount: "{{ states('input_text.commitment_broadband_amount') }}"
          expiry: "{{ states('input_datetime.commitment_broadband_expiry') }}"
          archived: "{{ states('input_boolean.commitment_broadband_archived') }}"

      - name: "Energy — Days Remaining"
        unique_id: commitment_energy_days
        icon: mdi:lightning-bolt
        unit_of_measurement: "days"
        state: >
          {% set expiry = states('input_datetime.commitment_energy_expiry') %}
          {% if expiry in ['unknown', 'unavailable', ''] %}
            unknown
          {% else %}
            {{ (strptime(expiry, '%Y-%m-%d').date() - now().date()).days }}
          {% endif %}
        attributes:
          status: *status_template
          commitment: "Energy"
          provider: "{{ states('input_text.commitment_energy_provider') }}"
          amount: "{{ states('input_text.commitment_energy_amount') }}"
          expiry: "{{ states('input_datetime.commitment_energy_expiry') }}"
          archived: "{{ states('input_boolean.commitment_energy_archived') }}"

      - name: "Phone Contract — Days Remaining"
        unique_id: commitment_phone_days
        icon: mdi:cellphone
        unit_of_measurement: "days"
        state: >
          {% set expiry = states('input_datetime.commitment_phone_expiry') %}
          {% if expiry in ['unknown', 'unavailable', ''] %}
            unknown
          {% else %}
            {{ (strptime(expiry, '%Y-%m-%d').date() - now().date()).days }}
          {% endif %}
        attributes:
          status: *status_template
          commitment: "Phone Contract"
          provider: "{{ states('input_text.commitment_phone_provider') }}"
          amount: "{{ states('input_text.commitment_phone_amount') }}"
          expiry: "{{ states('input_datetime.commitment_phone_expiry') }}"
          archived: "{{ states('input_boolean.commitment_phone_archived') }}"

  # ── Summary sensors ──
  - sensor:
      - name: "Financial Commitments — Total Active"
        unique_id: commitments_total_active
        icon: mdi:counter
        state: >
          {% set sensors = [
            'sensor.mortgage_days_remaining',
            'sensor.car_insurance_days_remaining',
            'sensor.home_insurance_days_remaining',
            'sensor.broadband_days_remaining',
            'sensor.energy_days_remaining',
            'sensor.phone_contract_days_remaining'
          ] %}
          {% set ns = namespace(count=0) %}
          {% for s in sensors %}
            {% if state_attr(s, 'archived') != 'on' and states(s) not in ['unknown', 'unavailable'] %}
              {% set ns.count = ns.count + 1 %}
            {% endif %}
          {% endfor %}
          {{ ns.count }}

      - name: "Financial Commitments — Urgent Count"
        unique_id: commitments_urgent_count
        icon: mdi:alert-circle
        state: >
          {% set sensors = [
            'sensor.mortgage_days_remaining',
            'sensor.car_insurance_days_remaining',
            'sensor.home_insurance_days_remaining',
            'sensor.broadband_days_remaining',
            'sensor.energy_days_remaining',
            'sensor.phone_contract_days_remaining'
          ] %}
          {% set ns = namespace(count=0) %}
          {% for s in sensors %}
            {% if state_attr(s, 'archived') != 'on'
               and states(s) not in ['unknown', 'unavailable']
               and states(s) | int <= 7 %}
              {% set ns.count = ns.count + 1 %}
            {% endif %}
          {% endfor %}
          {{ ns.count }}

      - name: "Financial Commitments — Expired Count"
        unique_id: commitments_expired_count
        icon: mdi:alert-octagon
        state: >
          {% set sensors = [
            'sensor.mortgage_days_remaining',
            'sensor.car_insurance_days_remaining',
            'sensor.home_insurance_days_remaining',
            'sensor.broadband_days_remaining',
            'sensor.energy_days_remaining',
            'sensor.phone_contract_days_remaining'
          ] %}
          {% set ns = namespace(count=0) %}
          {% for s in sensors %}
            {% if state_attr(s, 'archived') != 'on'
               and states(s) not in ['unknown', 'unavailable']
               and states(s) | int < 0 %}
              {% set ns.count = ns.count + 1 %}
            {% endif %}
          {% endfor %}
          {{ ns.count }}
