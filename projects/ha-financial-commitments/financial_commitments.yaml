# Home Assistant — Financial Commitment Tracker
#
# Drop-in configuration for tracking financial commitments and
# getting Telegram reminders before they expire.
#
# Usage:
#   1. Copy the files into your HA config directory
#   2. Add the following to your main configuration.yaml:
#
#        homeassistant:
#          packages:
#            financial_commitments: !include financial_commitments.yaml
#
#        automation: !include automations.yaml
#
#   3. Configure the Telegram bot integration in HA first:
#        https://www.home-assistant.io/integrations/telegram_bot/
#
#   4. Restart Home Assistant, then go to Settings → Devices & Services
#      → Helpers to see/edit the commitment helpers.

# ── Input helpers ─────────────────────────────────────────────────────────────
# Each commitment needs: name (implicit in entity_id), expiry date, provider,
# amount, category, and an archive toggle.
#
# To add a new commitment, copy one of the blocks below and change the prefix.
# Naming convention: commitment_<slug>_<field>

input_datetime:
